name: Rust

on:
  pull_request:
    branches: ["master", "develop"]
  push:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          components: rustfmt, clippy, llvm-tools-preview
      - name: Install lockpick
        uses: taiki-e/install-action@v2
        with:
          tool: lockpick,cargo-llvm-cov,cargo-machete,cargo-audit,cargo-nextest
      - name: Run checks
        run: lockpick -v

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate LCOV report
        run: cargo llvm-cov --branch --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  merge-gate:
    runs-on: ubuntu-latest
    needs: [check, coverage]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]]; then
            echo "::error::Check failed: ${{ needs.check.result }}"
            exit 1
          fi
          if [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "::error::Coverage check failed: ${{ needs.coverage.result }}"
            exit 1
          fi
