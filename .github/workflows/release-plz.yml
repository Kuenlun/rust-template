name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build matrix only. Skips release-plz, crates.io, asset upload."
        type: boolean
        default: false

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release-plz
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
      tag: ${{ steps.extract-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          # Crates.io publication is disabled. To enable: remove `publish =
          # false` from Cargo.toml, add the commented-out metadata block,
          # and uncomment the line below (requires CARGO_REGISTRY_TOKEN
          # secret in repo settings).
          # CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Extract tag name
        id: extract-tag
        if: steps.release-plz.outputs.releases_created == 'true'
        run: |
          TAG=$(echo '${{ steps.release-plz.outputs.releases }}' | jq -r '.[0].tag')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  upload-assets:
    name: Upload Binaries (${{ matrix.target }})
    needs: release-plz
    if: >-
      ${{
        !cancelled() && (
          (github.event_name == 'push' && needs.release-plz.result == 'success' && needs.release-plz.outputs.releases_created == 'true' && needs.release-plz.outputs.tag != '')
          || (github.event_name == 'workflow_dispatch' && inputs.dry_run)
        )
      }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            rustflags: "-C target-cpu=x86-64-v3"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            rustflags: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            rustflags: "-C target-cpu=x86-64-v3"
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            rustflags: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            rustflags: "-C target-cpu=x86-64-v3"
          - target: aarch64-apple-darwin
            os: macos-latest
            rustflags: "-C target-cpu=apple-m1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          targets: ${{ matrix.target }}

      - name: Install musl tools (dry-run, x86_64-linux-musl)
        if: >-
          ${{ github.event_name == 'workflow_dispatch'
              && inputs.dry_run
              && matrix.target == 'x86_64-unknown-linux-musl' }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (dry-run, aarch64-linux-musl)
        if: >-
          ${{ github.event_name == 'workflow_dispatch'
              && inputs.dry_run
              && matrix.target == 'aarch64-unknown-linux-musl' }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Dry-run build (cross)
        if: >-
          ${{ github.event_name == 'workflow_dispatch'
              && inputs.dry_run
              && matrix.target == 'aarch64-unknown-linux-musl' }}
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cross build --release --target ${{ matrix.target }} --bin rust-template

      - name: Dry-run build (cargo)
        if: >-
          ${{ github.event_name == 'workflow_dispatch'
              && inputs.dry_run
              && matrix.target != 'aarch64-unknown-linux-musl' }}
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} --bin rust-template

      - name: Install Rust toolchain (release)
        if: github.event_name == 'push'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          targets: ${{ matrix.target }}

      - name: Install musl tools (release, x86_64-linux-musl)
        if: >-
          ${{ github.event_name == 'push'
              && matrix.target == 'x86_64-unknown-linux-musl' }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Upload binaries to release
        if: github.event_name == 'push'
        uses: taiki-e/upload-rust-binary-action@v1
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        with:
          bin: rust-template
          target: ${{ matrix.target }}
          ref: refs/tags/${{ needs.release-plz.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
